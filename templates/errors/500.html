{% extends "base.html" %}
{% block title %}500 Server Error{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
  <div class="col-md-6 text-center">
    <div style="font-size: 5rem;">⚠️</div>
    <h1 class="display-4 fw-bold text-danger">500</h1>
    <h2 class="h4 mb-3">Internal Server Error</h2>
    <p class="text-muted">
      Something went wrong on the server. Check the terminal output for the Python traceback.
    </p>
    <a href="{{ url_for('index') }}" class="btn btn-primary mt-2">
      <i class="bi bi-house me-1"></i> Return to Home
    </a>
  </div>
</div>
{% endblock %}
